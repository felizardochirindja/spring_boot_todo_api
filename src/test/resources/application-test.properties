# Test profile configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

security.jwt.secret-key=test_secret_key

# mocket Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
app.message_broker.name=kafka
app.topics.task_events=topic-test

# Resilience4j circuit breaker config
resilience4j.circuitbreaker.instances.fetchTasksByUserId.minimum-number-of-calls=4
resilience4j.circuitbreaker.instances.fetchTasksByUserId.slidingWindowSize=8
resilience4j.circuitbreaker.instances.fetchTasksByUserId.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.instances.fetchTasksByUserId.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.fetchTasksByUserId.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.fetchTasksByUserId.failure-rate-threshold=50

# Management endpoints
management.endpoints.access.default=none
management.endpoint.health.access=unrestricted

# Logging
logging.level.io.github.bucket4j=DEBUG