spring.datasource.url=jdbc:mysql://localhost:3306/todo_api
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

spring.cache.type=jcache
spring.cache.jcache.provider=com.hazelcast.cache.impl.HazelcastServerCachingProvider

spring.hazelcast.config=classpath:hazelcast.xml

spring.main.allow-bean-definition-overriding=true

spring.flyway.enabled=true

security.jwt.secret-key=my_secret_key

spring.kafka.bootstrap-servers=localhost:9092
app.message_broker.name=kafka
app.topics.task_events=task_events

management.endpoints.access.default=none
management.endpoint.health.access=unrestricted
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.endpoint.loggers.access=unrestricted
management.endpoint.info.access=unrestricted
management.endpoints.web.exposure.include=health,prometheus,loggers,info
management.info.git.mode=full
management.info.git.enabled=true

resilience4j.circuitbreaker.instances.fetchTasksByUserId.minimum-number-of-calls=4
resilience4j.circuitbreaker.instances.fetchTasksByUserId.slidingWindowSize=8
resilience4j.circuitbreaker.instances.fetchTasksByUserId.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.fetchTasksByUserId.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.fetchTasksByUserId.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.fetchTasksByUserId.failure-rate-threshold=50

bucket4j.enabled=true

bucket4j.filters[0].cache-name=rate-limit-buckets
bucket4j.filters[0].url=.*
bucket4j.filters[0].strategy=first
bucket4j.filters[0].http-response-body={ "status": 429, "error": "Too Many Requests", "message": "Rate limit exceeded. Retry after 1 minute." }

bucket4j.filters[0].rate-limits[0].cache-key=getRemoteAddr()
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=10
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=30
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=seconds
bucket4j.filters[0].rate-limits[0].bandwidths[0].refill-speed=interval
