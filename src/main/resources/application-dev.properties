spring.datasource.url=jdbc:mysql://localhost:3306/todo_api
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true

security.jwt.secret-key=my_secret_key

spring.kafka.bootstrap-servers=localhost:9092
app.message_broker.name=kafka
app.topics.task_events=task_events

management.endpoints.access.default=none
management.endpoint.health.access=unrestricted
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.endpoint.loggers.access=unrestricted
management.endpoint.info.access=unrestricted
management.endpoints.web.exposure.include=health,prometheus,loggers,info
management.info.git.mode=full
management.info.git.enabled=true

spring.cache.type=jcache
spring.cache.jcache.provider=com.hazelcast.cache.impl.HazelcastServerCachingProvider
spring.cache.jcache.config=classpath:hazelcast.xml

bucket4j.enabled=true
bucket4j.filters[0].filter-order=1
bucket4j.cache-to-use=hazelcast-spring
bucket4j.filters[0].cache-name=rate-limit-bucket
bucket4j.filters[0].url=.*
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=5
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=2
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=minutes
bucket4j.filters[0].rate-limits[0].bandwidths[0].refill-speed=interval
