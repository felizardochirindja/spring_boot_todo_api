spring.datasource.url=jdbc:${DB_DRIVER}://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true

security.jwt.secret-key=my_secret_key

spring.kafka.bootstrap-servers=${KAFKA_BROKERS}

app.message_broker.name=kafka
app.topics.task_events=task_events
