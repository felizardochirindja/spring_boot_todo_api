spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/todo_api}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:12345678}

spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=none

security.jwt.secret-key=my-secret-key

app.topics.task_events=task-events-test

resilience4j.circuitbreaker.instances.fetchTasksByUserId.minimum-number-of-calls=4
resilience4j.circuitbreaker.instances.fetchTasksByUserId.slidingWindowSize=8
resilience4j.circuitbreaker.instances.fetchTasksByUserId.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.instances.fetchTasksByUserId.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.fetchTasksByUserId.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.fetchTasksByUserId.failure-rate-threshold=50
